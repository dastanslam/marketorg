{% load static %}
<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Opsoon - | Tailwind CSS шаблон аутентификации</title>
        <meta name="description" content="Шаблон HTML на Tailwind CSS для SaaS — многоцелевой лендинг, корпоративный сайт, страницы аутентификации, запуск продукта, агентство или стартап, чистый, современный, креативный и многофункциональный шаблон на Tailwind CSS v3 и т.д."/>
        <meta name="author" content="DastanTeams"/>

        <!-- favicon -->
        <link href="{% static 'login/images/favicon.ico' %}" rel="shortcut icon">

    <!-- Main Css -->
    <link href="{% static 'login/css/style.css' %}" rel="stylesheet" type="text/css">
    </head>

    <body>
        <!-- =========== Main Section Start =========== -->
        <section class="h-screen w-full">
            <div class="grid xl:grid-cols-2 grid-cols-1 h-full">

                <div class="max-w-lg mx-auto w-full flex flex-col items-center justify-center">
                    <div class="text-center mb-7">
                        <a href="index.html" class="grow block mb-8">
                            <img class="h-8 mx-auto" src="assets/images/light-logo.png" alt="images">
                        </a>

                        <div class="text-center">
                            <h3 class="text-2xl font-semibold text-dark mb-3">До скорой встречи!</h3>
                            <p class="text-base font-medium text-light">Вы успешно вышли из системы.</p>
                        </div>
                    </div>

                    <svg xmlns="http://www.w3.org/2000/svg" class="w-44 h-44 mb-7" viewBox="0 0 328 327" fill="none">
                        <circle class="fill-primary/10" r="163.125" transform="matrix(-1 0 0 1 163.942 163.854)" />
                        <path class="stroke-primary fill-primary/40" d="M146.715 218.157L100.443 171.885C97.0527 167.964 95.4424 164.144 95.4424 160.409C95.4424 156.683 97.0452 152.872 100.42 148.961C104.331 145.587 108.142 143.984 111.868 143.984C115.603 143.984 119.423 145.594 123.343 148.984L146.012 171.653L146.724 172.365L147.431 171.648L204.137 114.131C208.057 110.742 211.876 109.133 215.61 109.133C219.337 109.133 223.148 110.736 227.06 114.112C230.718 118.308 232.441 122.253 232.441 125.964C232.441 129.674 230.717 133.352 227.06 137.008L227.057 137.012L146.715 218.157Z" stroke-width="2"/>
                    </svg>

                    <p class="shrink text-light text-center">Пожалуйста, войдите снова <a href="{% url 'signin' %}" class="text-dark font-semibold ms-1"><b>Войти</b></a></p>
                    <p class="shrink text-light text-center">Продолжить как гость <a href="{% url 'index' %}" class="text-dark font-semibold ms-1"><b>Главная</b></a></p>

                </div>

                <div class="hidden xl:block">
                    <div class="relative w-full h-screen bg-[url(../images/img-2.jpg)] bg-center bg-cover"></div>
                </div>
            </div>
        </section>
        <!-- =========== Main Section End =========== -->

        <!-- Preline Js -->
        <script src="{% static 'login/libs/preline/preline.js' %}" ></script>

        <!-- Lucide Js -->
        <script src="{% static 'login/libs/lucide/umd/lucide.min.js' %}" ></script>

        <!-- Main App Js -->
        <script src="{% static 'login/js/app.js' %}" ></script>

    </body>
</html>
