{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Opsoon - | Tailwind CSS Authentications Template</title>
    <meta name="description" content="Tailwind CSS Saas HTML Template Is A Multi Purpose Landing Page Template, Corporate, Authentication, Launching Web, Agency or Business Startup, Clean, Modern, Creative, Multipurpose and Tailwind CSS Tailwind v3 etc."/>
    <meta name="author" content="Zoyothemes"/>

    <!-- favicon -->
    <link href="{% static 'login/images/favicon.ico' %}" rel="shortcut icon">

    <!-- Main Css -->
    <link href="{% static 'login/css/style.css' %}" rel="stylesheet" type="text/css">
</head>

<body>
    <!-- =========== Main Section Start =========== -->
    <section class="h-screen w-full">
        <div class="grid xl:grid-cols-2 grid-cols-1 h-full">
            <div class="max-w-lg mx-auto w-full flex flex-col justify-center md:items-start items-center p-6">
                <div class="md:text-start text-center mb-7">
                    <a href="index.html" class="grow block mb-8">
                        <img class="h-8 md:mx-0 mx-auto" src="{% static 'login/images/light-logo.png' %}" alt="images">
                    </a>

                    <div class="md:text-start text-center">
                        <h3 class="text-2xl font-semibold text-dark mb-3">Добро пожаловать в authea</h3>
                        <p class="text-base font-medium text-light">С возвращением! Выберите способ регистрации</p>
                    </div>
                </div>

                <form class="text-start w-full">

                    <div class="mb-4">
                        <label for="email-addon" class="block text-base font-semibold text-dark mb-2">Email адрес</label>
                        <input id="email-addon" class="block w-full rounded-md py-2.5 px-4 text-dark text-base font-medium border-gray-300 focus:gray-300 focus:border-primary focus:outline-0 focus:ring-0 placeholder:text-light placeholder:text-base" type="email" placeholder="Введите ваш email">
                    </div>

                    <div class="mb-4">
                        <label for="password-addon" class="block text-base font-semibold text-dark mb-2">Пароль</label>
                        <div class="flex">
                            <input type="password" id="password-addon" class="form-password text-dark text-base font-medium block w-full rounded-s-md py-2.5 px-4 border border-gray-300 focus:gray-300 focus:border-primary focus:outline-0 focus:ring-0 placeholder:text-light placeholder:text-base" placeholder="Введите ваш пароль">
                            <button type="button" data-hs-toggle-password='{"target": "#password-addon"}' class="inline-flex items-center justify-center py-2.5 px-4 border rounded-e-md -ms-px border-gray-300">
                                <i class="hs-password-active:hidden h-5 w-5 text-dark" data-lucide="eye"></i>
                                <i data-lucide="eye-off" class="hidden hs-password-active:block h-5 w-5 text-dark"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex justify-between items-center flex-wrap gap-x-1 gap-y-2 mb-6 mt-3">
                        <div class="inline-flex items-center">
                            <input type="checkbox" id="checkbox-signin" class="h-4 w-4 text-base rounded border-gray-300 text-dark focus:ring focus:ring-default-950/30 focus:ring-offset-0">
                            <label class="text-base ms-2 text-light font-medium align-middle select-none" for="checkbox-signin">Запомнить меня</label>
                        </div>
                        <a href="auth-recoverpw.html" class="text-base text-dark"><small>Забыли пароль?</small></a>
                    </div>

                    <div class="text-center mb-7">
                        <button type="submit" class="w-full inline-flex items-center justify-center px-6 py-2.5 bg-primary font-bold text-base text-white rounded-md transition-all duration-500" type="submit">Войти</button>
                    </div>

                    <p class="shrink text-light text-center">Нет аккаунта? <a href="auth-register.html" class="text-dark font-semibold ms-1"><b>Зарегистрироваться</b></a></p>
                </form>
            </div>

            <div class="hidden xl:block">
                <div class="relative w-full h-screen bg-[url(../images/img-2.jpg)] bg-center bg-cover"></div>
            </div>
        </div>

    </section>
    <!-- =========== Main Section End =========== -->
    
    <!-- Preline Js -->
    <script src="{% static 'login/libs/preline/preline.js' %}" ></script>

    <!-- Lucide Js -->
    <script src="{% static 'login/libs/lucide/umd/lucide.min.js' %}" ></script>

    <!-- Main App Js -->
    <script src="{% static 'login/js/app.js' %}" ></script>

    </body>
</html>
